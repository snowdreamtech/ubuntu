---
# Dependabot Smart Sync
# Purpose: Automatically regenerates .github/dependabot.yml based on detected ecosystems.
# Trigger: Push to dev/main (manifest file changes), monthly schedule, or manual dispatch.
# Design:
#   - Uses scripts/gen-dependabot.sh to scan for manifest files via git ls-files.
#   - Only commits if the generated config differs from the current one.
#   - Uses native git commands — no third-party commit Actions.

name: "🤖 Dependabot Smart Sync"

"on":
  push:
    branches: ["dev"]
    paths:
      # Trigger when manifest files or the generator script change
      - "package.json"
      - "**/package.json"
      - "go.mod"
      - "**/go.mod"
      - "Cargo.toml"
      - "**/Cargo.toml"
      - "requirements.txt"
      - "**/requirements.txt"
      - "Dockerfile"
      - "**/Dockerfile"
      - "composer.json"
      - "**/composer.json"
      - "Gemfile"
      - "**/Gemfile"
      - "mix.exs"
      - "pubspec.yaml"
      - "Package.swift"
      - "**/*.tf"
      - "**/devcontainer.json"
      - ".pre-commit-config.yaml"
      - "Chart.yaml"
      - "scripts/gen-dependabot.sh"
      # Mise toolchain configuration
      - ".mise.toml"
      - ".github/workflows/dependabot-sync.yml"
  schedule:
    # Weekly safety net: every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    name: "🔄 Sync Dependabot Config"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: maintenance
    timeout-minutes: 15
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            raw.githubusercontent.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            avatars.githubusercontent.com:443
            github.com:443
            packages.microsoft.com:443
            archive.ubuntu.com:80
            archive.ubuntu.com:443
            security.ubuntu.com:80
            security.ubuntu.com:443
            ports.ubuntu.com:80
            ports.ubuntu.com:443
            keyserver.ubuntu.com:80
            keyserver.ubuntu.com:443
            changelogs.ubuntu.com:80
            changelogs.ubuntu.com:443
            deb.debian.org:80
            deb.debian.org:443
            security.debian.org:80
            security.debian.org:443
            snapshot.debian.org:80
            snapshot.debian.org:443
            dl.rockylinux.org:443
            mirrors.rockylinux.org:443
            mirror.centos.org:443
            vault.centos.org:443
            isv-data.centos.org:443
            mirrorlist.centos.org:80
            mirrorlist.centos.org:443
            cdn.redhat.com:443
            cdn-ubi.redhat.com:443
            access.redhat.com:443
            sso.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            golang.org:443
            pkg.go.dev:443
            dl.google.com:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            ghcr.io:443
            production.cloudflare.docker.com:80
            production.cloudflare.docker.com:443
            registry-1.docker.io:443
            auth.docker.io:443
            docker.io:443
            quay.io:443
            cdn.quay.io:443
            docker-images-prod.s3.us-west-2.amazonaws.com:443
            docker-images-prod.s3.us-east-1.amazonaws.com:443
            docker-images-prod.s3.amazonaws.com:443
            s3.amazonaws.com:443
            s3.us-west-2.amazonaws.com:443
            s3.us-east-1.amazonaws.com:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            aquasecurity.github.io:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
            rekor.sigstore.dev:443
            fulcio.sigstore.dev:443
            api.sigstore.dev:443
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          ref: ${{ github.ref }}

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'mise.lock', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🩺 Verify Environment Health"
        shell: sh
        # Run in a separate step so GITHUB_PATH entries written by make setup
        # (mise shims) are visible in this step's PATH.
        run: |
          make check-env
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🧪 Run Generator Smoke Test"
        shell: sh
        run: |
          sh tests/smoke-test-gen-dependabot.sh

      - name: "🤖 Generate Dependabot Config"
        shell: sh
        run: |
          make gen-dependabot
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "🔧 Update Mise Toolchain & Lockfile"
        shell: sh
        run: |
          make update-tools
          make sync-lock
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}

      - name: "📝 Commit Changes (if any)"
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if git diff --quiet .github/dependabot.yml mise.lock scripts/lib/versions.sh .mise.toml 2>/dev/null; then
            echo "✅ No changes detected. Dependabot config and Mise toolchain are up-to-date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/dependabot.yml mise.lock scripts/lib/versions.sh .mise.toml
            git commit --signoff -m "chore(deps): sync dependabot config and mise toolchain [skip ci]"
            git push origin HEAD:"$GITHUB_REF"
            echo "✅ Dependabot config and Mise toolchain updated and pushed."
          fi
