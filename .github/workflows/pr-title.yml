---
# PR Title Check
# Purpose: Verifies that pull request titles adhere to the Conventional Commits specification.
# Trigger: PR events (opened, edited, synchronize).
# Permissions:
#   - pull-requests: read (Required to read the pull request metadata via the GitHub API).
# Concurrency:
#   - group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Immediate feedback on updated PR titles).
# Design:
#   - Uses 'pull_request' to ensure safety by preventing access to repository secrets from forks.
#   - Near-instant global verification to maintain repository history purity.

name: "✅ PR Title Check"

"on":
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions: {}

env:
  UNIRTM_LOCKED: 1

jobs:
  commitlint:
    name: "🔍 Semantic Title Validation"
    runs-on: ubuntu-latest
    concurrency:
      group: pr-title-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      pull-requests: read # Required to read the pull request metadata via the GitHub API
      statuses: write # Required to post status check results
    timeout-minutes: 30 # Title linting is near-instant
    steps:
      - name: "🔒 Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            raw.githubusercontent.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            avatars.githubusercontent.com:443
            github.com:443
            packages.microsoft.com:443
            archive.ubuntu.com:80
            archive.ubuntu.com:443
            security.ubuntu.com:80
            security.ubuntu.com:443
            ports.ubuntu.com:80
            ports.ubuntu.com:443
            keyserver.ubuntu.com:80
            keyserver.ubuntu.com:443
            changelogs.ubuntu.com:80
            changelogs.ubuntu.com:443
            deb.debian.org:80
            deb.debian.org:443
            security.debian.org:80
            security.debian.org:443
            snapshot.debian.org:80
            snapshot.debian.org:443
            dl.rockylinux.org:443
            mirrors.rockylinux.org:443
            mirror.centos.org:443
            vault.centos.org:443
            isv-data.centos.org:443
            mirrorlist.centos.org:80
            mirrorlist.centos.org:443
            cdn.redhat.com:443
            cdn-ubi.redhat.com:443
            access.redhat.com:443
            sso.redhat.com:443
            dl-cdn.alpinelinux.org:443
      - name: "🔍 Validate PR Title Integrity"
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Ensures PR titles follow Conventional Commits to maintain repository history purity.
          requireScope: false
          validateSingleCommit: true
