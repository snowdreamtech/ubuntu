---
# Pull Request Labeler
# Purpose: Automatically categorizes PRs based on changed file paths to improve backlog visibility.
# Trigger: PR events (opened, synchronize, reopened).
# Permissions:
#   - pull-requests: write (Required to apply labels to the pull request).
#   - contents: read (Required to analyze changed files via the GitHub API).
# Concurrency:
#   - group: labeler-${{ github.event.pull_request.number }} (Scoped to PR to avoid global collisions).
#   - cancel-in-progress: true (Subsequent PR updates supersede previous labeling runs).
# Design:
#   - Configuration-driven via '.github/labeler.yml' for easy maintenance.
#   - Lightweight, event-driven categorization with near-zero resource footprint.

name: "🏷️ Pull Request Labeler"

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

env:
  MISE_LOCKED: 1

jobs:
  label:
    name: "🏷️ Pull Request Categorization"
    runs-on: ubuntu-latest
    concurrency:
      group: labeler-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      pull-requests: write # Required to apply labels to the pull request
      contents: read # Required to analyze changed files via the GitHub API
    timeout-minutes: 15 # Path-based labeling is extremely fast
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            raw.githubusercontent.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            avatars.githubusercontent.com:443
            github.com:443
            packages.microsoft.com:443
            archive.ubuntu.com:80
            archive.ubuntu.com:443
            security.ubuntu.com:80
            security.ubuntu.com:443
            ports.ubuntu.com:80
            ports.ubuntu.com:443
            keyserver.ubuntu.com:80
            keyserver.ubuntu.com:443
            changelogs.ubuntu.com:80
            changelogs.ubuntu.com:443
            deb.debian.org:80
            deb.debian.org:443
            security.debian.org:80
            security.debian.org:443
            snapshot.debian.org:80
            snapshot.debian.org:443
            dl.rockylinux.org:443
            mirrors.rockylinux.org:443
            mirror.centos.org:443
            vault.centos.org:443
            isv-data.centos.org:443
            mirrorlist.centos.org:80
            mirrorlist.centos.org:443
            cdn.redhat.com:443
            cdn-ubi.redhat.com:443
            access.redhat.com:443
            sso.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            golang.org:443
            pkg.go.dev:443
            dl.google.com:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            ghcr.io:443
            production.cloudflare.docker.com:80
            production.cloudflare.docker.com:443
            registry-1.docker.io:443
            auth.docker.io:443
            docker.io:443
            quay.io:443
            cdn.quay.io:443
            docker-images-prod.s3.us-west-2.amazonaws.com:443
            docker-images-prod.s3.us-east-1.amazonaws.com:443
            docker-images-prod.s3.amazonaws.com:443
            s3.amazonaws.com:443
            s3.us-west-2.amazonaws.com:443
            s3.us-east-1.amazonaws.com:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            get.trivy.dev:443
            aquasecurity.github.io:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
            rekor.sigstore.dev:443
            fulcio.sigstore.dev:443
            api.sigstore.dev:443
      - name: "🔍 Triage Pull Request (Labeler)"
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          # Automatically applies labels based on file path changes to improve maintenance visibility.
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
