---
name: Docker

"on":
  push:
    branches:
      - main
      - dev
    tags:
      - '*-v*'
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        type: choice
        options:
          - all
          - '22'
          - '24'
          - '25'
          - '26'

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  buildx:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 (Jammy) - 5 platforms
          # Note: riscv64 support was added in Ubuntu 24.04
          - version: "22"
            codename: "jammy"
            is_latest: false
            platforms: "linux/amd64,linux/arm64,linux/armhf,linux/ppc64le,linux/s390x"
          # Ubuntu 24.04 (Noble) - 6 platforms (adds riscv64)
          - version: "24"
            codename: "noble"
            is_latest: true
            platforms: "linux/amd64,linux/arm64,linux/armhf,linux/ppc64le,linux/s390x,linux/riscv64"
          # Ubuntu 25.10 (Questing) - 6 platforms
          - version: "25"
            codename: "questing"
            is_latest: false
            platforms: "linux/amd64,linux/arm64,linux/armhf,linux/ppc64le,linux/s390x,linux/riscv64"
          # Ubuntu 26.04 (Resolute) - 6 platforms
          - version: "26"
            codename: "resolute"
            is_latest: false
            platforms: "linux/amd64,linux/arm64,linux/armhf,linux/ppc64le,linux/s390x,linux/riscv64"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/${{ matrix.version }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            snowdreamtech/ubuntu:${{ matrix.version }}-latest
            snowdreamtech/ubuntu:${{ matrix.codename }}
            snowdreamtech/ubuntu:${{ matrix.codename }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: snowdreamtech/ubuntu:${{ matrix.version }}-latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'
